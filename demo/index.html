<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Auto-Capture Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .capture-area {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .video-container {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    
    #video {
      display: none;
    }
    
    #canvas {
      max-width: 100%;
      height: auto;
      display: block;
    }
    
    .result-container {
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      min-width: 300px;
    }
    
    .result-container h2 {
      margin-bottom: 15px;
      color: #00d9ff;
    }
    
    #result {
      background: #0f0f23;
      border-radius: 8px;
      padding: 10px;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }
    
    #result canvas {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    
    button:hover {
      transform: scale(1.02);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #startBtn {
      background: #00d9ff;
      color: #000;
    }
    
    #stopBtn {
      background: #ff4757;
      color: #fff;
    }
    
    #captureBtn {
      background: #2ed573;
      color: #000;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #16213e;
      border-radius: 8px;
      text-align: center;
    }
    
    .status-item {
      margin: 10px 0;
    }
    
    .status-label {
      color: #888;
      font-size: 14px;
    }
    
    .status-value {
      font-size: 18px;
      font-weight: bold;
    }
    
    .progress-bar {
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d9ff, #2ed573);
      transition: width 0.1s ease-out;
      width: 0%;
    }
    
    .issues {
      margin-top: 15px;
      padding: 10px;
      background: rgba(255, 71, 87, 0.2);
      border-radius: 6px;
      border-left: 3px solid #ff4757;
    }
    
    .issues.good {
      background: rgba(46, 213, 115, 0.2);
      border-left-color: #2ed573;
    }
    
    .issues ul {
      list-style: none;
      padding-left: 0;
    }
    
    .issues li {
      padding: 5px 0;
    }
    
    .details {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
    
    .details pre {
      background: #0f0f23;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      max-height: 200px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
    }
    
    .loading-spinner {
      border: 4px solid #333;
      border-top: 4px solid #00d9ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 Document Auto-Capture</h1>
    
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      <p>Loading OpenCV.js...</p>
    </div>
    
    <div id="app" style="display: none;">
      <div class="capture-area">
        <div class="video-container">
          <video id="video" playsinline></video>
          <canvas id="canvas" width="640" height="480"></canvas>
        </div>
        
        <div class="result-container">
          <h2>Captured Document</h2>
          <div id="result">
            <span>No document captured yet</span>
          </div>
          
          <div class="status">
            <div class="status-item">
              <div class="status-label">Quality Score</div>
              <div class="status-value" id="score">-</div>
            </div>
            
            <div class="status-item">
              <div class="status-label">Capture Progress</div>
              <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
              </div>
            </div>
            
            <div id="issues" class="issues" style="display: none;">
              <ul id="issuesList"></ul>
            </div>
          </div>
          
          <div class="details">
            <details>
              <summary>Quality Details</summary>
              <pre id="detailsJson">-</pre>
            </details>
          </div>
        </div>
      </div>
      
      <div class="controls">
        <button id="startBtn">▶ Start Camera</button>
        <button id="stopBtn" disabled>⏹ Stop</button>
        <button id="captureBtn" disabled>📸 Manual Capture</button>
      </div>
    </div>
  </div>

  <!-- Load OpenCV.js -->
  <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="onOpenCvReady()"></script>
  
  <!-- Load jscanify modules -->
  <script src="../src/jscanify.js"></script>
  <script src="../src/quality.js"></script>
  <script src="../src/document-auto-capture.js"></script>
  
  <script>
    // Wait for OpenCV to load
    function onOpenCvReady() {
      cv['onRuntimeInitialized'] = () => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        initApp();
      };
    }
    
    // Check if OpenCV is already loaded
    if (typeof cv !== 'undefined' && cv.Mat) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      initApp();
    }
    
    function initApp() {
      // Get DOM elements
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const result = document.getElementById('result');
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const captureBtn = document.getElementById('captureBtn');
      const scoreEl = document.getElementById('score');
      const progressEl = document.getElementById('progress');
      const issuesEl = document.getElementById('issues');
      const issuesListEl = document.getElementById('issuesList');
      const detailsJsonEl = document.getElementById('detailsJson');
      
      // Create instances
      const scanner = new jscanify();
      const quality = new QualityAssessment({
        thresholds: {
          // Adjust thresholds for ID documents
          document: {
            minAreaRatio: 0.10,
            maxAreaRatio: 0.90,
            minAspectRatio: 1.3,  // ID cards are typically ~1.58 (85.6mm x 53.98mm)
            maxAspectRatio: 1.8,
          }
        }
      });
      
      const autoCapture = new DocumentAutoCapture(scanner, quality, {
        capture: {
          requiredGoodFrames: 8,
          assessmentInterval: 80,
        },
        output: {
          width: 600,
          height: 380,  // Approximate ID card aspect ratio
        }
      });
      
      // Set up callbacks
      autoCapture.onCapture = (captureResult) => {
        result.innerHTML = '';
        result.appendChild(captureResult.extracted);
        
        // Flash effect
        result.style.boxShadow = '0 0 30px #2ed573';
        setTimeout(() => {
          result.style.boxShadow = 'none';
        }, 500);
      };
      
      autoCapture.onQualityUpdate = (update) => {
        // Update score
        scoreEl.textContent = `${update.assessment.score}%`;
        scoreEl.style.color = update.assessment.isGood ? '#2ed573' : 
                              update.assessment.isAcceptable ? '#ffa502' : '#ff4757';
        
        // Update progress bar
        progressEl.style.width = `${update.progress * 100}%`;
        
        // Update issues
        if (update.assessment.issues.length > 0) {
          issuesEl.style.display = 'block';
          issuesEl.className = 'issues';
          issuesListEl.innerHTML = update.assessment.issues
            .map(issue => `<li>⚠️ ${issue}</li>`)
            .join('');
        } else {
          issuesEl.style.display = 'block';
          issuesEl.className = 'issues good';
          issuesListEl.innerHTML = '<li>✅ Ready to capture!</li>';
        }
        
        // Update details
        if (update.assessment.details) {
          detailsJsonEl.textContent = JSON.stringify(update.assessment.details, null, 2);
        }
      };
      
      autoCapture.onStateChange = (state) => {
        console.log('State changed:', state);
        
        if (state === 'started') {
          startBtn.disabled = true;
          stopBtn.disabled = false;
          captureBtn.disabled = false;
        } else if (state === 'stopped') {
          startBtn.disabled = false;
          stopBtn.disabled = true;
          captureBtn.disabled = true;
          scoreEl.textContent = '-';
          progressEl.style.width = '0%';
          issuesEl.style.display = 'none';
        }
      };
      
      autoCapture.onError = (error) => {
        console.error('Error:', error);
        alert(`Error: ${error.message}`);
      };
      
      // Button handlers
      startBtn.addEventListener('click', () => {
        autoCapture.start(video, canvas);
      });
      
      stopBtn.addEventListener('click', () => {
        autoCapture.stop();
      });
      
      captureBtn.addEventListener('click', () => {
        autoCapture.captureNow();
      });
    }
  </script>
</body>
</html>
